services:
  api:
    build: ./shared
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      - LOG_LEVEL=WARNING
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --no-access-log

  scheduler:
    build: ./agents/scheduler
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./agents:/app/agents
      - ./shared:/app/shared
    env_file: .env
    environment:
      - LOG_LEVEL=INFO
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: prod
    restart: unless-stopped
    # Static files served by internal nginx — no port exposed directly

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
